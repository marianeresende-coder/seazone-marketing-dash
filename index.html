    function formatNumber(n, unit) {
      if (n === null || n === undefined) return '—';
      if (unit === 'R$') return `R$ ${n.toLocaleString('pt-BR')}`;
      if (unit === '%') return `${n}%`;
      if (n >= 1000000) return `${(n / 1000000).toFixed(1)}M`;
      if (n >= 1000) return `${(n / 1000).toFixed(1)}k`;
      return n.toLocaleString('pt-BR');
    }

    function calcPercent(real, meta) {
      if (real === null || meta === null || meta === 0) return null;
      return Math.round((real / meta) * 100);
    }

    function progressColor(pct) {
      if (pct === null) return 'bg-gray-300';
      if (pct >= 90) return 'bg-emerald-500';
      if (pct >= 70) return 'bg-amber-400';
      return 'bg-red-500';
    }

    function progressTextColor(pct) {
      if (pct === null) return 'text-gray-400';
      if (pct >= 90) return 'text-emerald-600';
      if (pct >= 70) return 'text-amber-600';
      return 'text-red-600';
    }

    // ============================================================
    // REUSABLE COMPONENTS
    // ============================================================

    function ProgressBar({ real, meta, unit, height = 'h-2.5' }) {
      const pct = calcPercent(real, meta);
      const width = pct !== null ? Math.min(pct, 100) : 0;
      const color = progressColor(pct);

      return (
        <div className={`w-full bg-gray-200 rounded-full ${height} overflow-hidden`}>
          <div
            className={`${color} ${height} rounded-full transition-all duration-500`}
            style={{ width: `${pct !== null ? width : 100}%`, opacity: pct === null ? 0.3 : 1 }}
          />
        </div>
      );
    }

    function KPICard({ label, real, meta, unit, fonte, compact = false, onClick }) {
      const pct = calcPercent(real, meta);
      const textColor = progressTextColor(pct);

      return (
        <div
          className={`bg-white rounded-xl border border-gray-200 ${compact ? 'p-4' : 'p-5'} hover:shadow-md transition-shadow ${onClick ? 'cursor-pointer hover:border-sea-400' : ''}`}
          onClick={onClick}
        >
          <div className="flex items-center justify-between mb-2">
            <span className={`${compact ? 'text-xs' : 'text-sm'} font-medium text-gray-500 uppercase tracking-wide`}>{label}</span>
            {fonte && <span className="text-[10px] text-gray-400 bg-gray-100 px-1.5 py-0.5 rounded">{fonte}</span>}
          </div>
          <div className="flex items-end gap-3 mb-3">

              {formatNumber(real, unit)}
            </span>
            <span className="text-sm text-gray-400 mb-0.5">
              / {formatNumber(meta, unit)}
            </span>
            <span className={`text-sm font-semibold ml-auto ${textColor}`}>
              {pct !== null ? `${pct}%` : '—'}
            </span>
          </div>
          <ProgressBar real={real} meta={meta} unit={unit} />
        </div>
      );
    }
